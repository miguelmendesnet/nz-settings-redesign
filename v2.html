<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sample Gallery — Gallery Features</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --brand: #FF5A00;
      --brand-hover: #E84F00;
      --brand-deep: #C94A1F;
      --brand-cream: #FFF1E5;
      --brand-cream-deep: #FBE0CC;
      --page-bg: #F4F4F2;
      --card-bg: #FFFFFF;
      --card-border: #E6E4DF;
      --soft-bg: #FAFAF8;
      --row-hover: #F4F3EF;
      --text-primary: #2A2C2F;
      --text-secondary: #6B6F75;
      --text-tertiary: #A0A4AB;
      --off-bg: #DAD8D2;
      --off-text: #797D85;
      --green: #1D9E75;
      --danger: #D14343;
      --nav-bg: #1C1C1E;
      --nav-text: #B5B7BB;
      --nav-active-bg: #2A1F1A;
    }
    body {
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--page-bg);
      color: var(--text-primary);
      margin: 0;
    }
    .toggle-track { transition: background-color 0.2s ease; }
    .toggle-thumb { transition: transform 0.2s ease; }
    .pp-row .pp-shared-action { opacity: 0; transition: opacity 0.15s; }
    .pp-row:hover .pp-shared-action { opacity: 1; }
    .modal-backdrop { animation: fadeIn 0.15s ease-out; }
    .modal-card { animation: popIn 0.18s ease-out; }
    .menu-pop { animation: popIn 0.12s ease-out; transform-origin: top right; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes popIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
    /* ============ Bottom-sheet drawer ============ */
    @keyframes sheet-slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes backdrop-fade-in { from { opacity: 0; } to { opacity: 1; } }
    .sheet-backdrop { animation: backdrop-fade-in 0.2s ease-out; }
    .sheet-panel { animation: sheet-slide-up 0.25s cubic-bezier(0.32, 0.72, 0, 1); }
    .sheet-item { transition: background-color 0.12s; }
    .sheet-item:active { background-color: #F4F3EF; }
    .role-card-hover:hover:not(.is-disabled) { border-color: var(--brand) !important; background: var(--brand-cream) !important; }
    .role-card-hover:hover:not(.is-disabled) .role-card-icon { color: var(--brand); }
    .role-card-hover.is-disabled { opacity: 0.5; cursor: not-allowed; }
    .menu-item:hover { background: var(--soft-bg); }
    .menu-item-danger:hover { background: #FDF0F0; }
    .add-role-btn { background: var(--brand); transition: background 0.15s; }
    .add-role-btn:hover { background: var(--brand-hover); }
    .feature-row { transition: background-color 0.15s; }
    .feature-row.is-collapsible:not(.is-open):hover { background: var(--row-hover); }
    .kebab-btn:hover { background: rgba(0,0,0,0.06); color: var(--text-secondary); }
    .nav-item { transition: color 0.15s, background 0.15s; color: var(--nav-text); }
    .nav-item:hover { color: #fff; }
    .nav-item.is-active { color: var(--brand); background: var(--nav-active-bg); }
    .tab-btn { position: relative; transition: color 0.15s; }
    .tab-btn:hover { color: var(--text-primary); }
    .tab-btn.is-active { color: var(--text-primary); font-weight: 600; }
    .tab-btn.is-active::after {
      content: '';
      position: absolute; left: 12px; right: 12px; bottom: -1px; height: 2px;
      background: var(--brand); border-radius: 2px;
    }
    .preview-btn { background: #1C1C1E; transition: background 0.15s; }
    .preview-btn:hover { background: #34343A; }
    .share-btn { background: #ECEAE5; color: #A8A6A2; cursor: not-allowed; }
    /* radios */
    .radio-dot {
      width: 16px; height: 16px; border-radius: 999px;
      border: 1.5px solid #BFBDB7; background: #fff;
      display: inline-flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .radio-dot.is-on { border-color: var(--brand); }
    .radio-dot.is-on::after {
      content: ''; width: 8px; height: 8px; border-radius: 999px; background: var(--brand);
    }
    /* checkbox */
    .check-box {
      width: 16px; height: 16px; border-radius: 3px; border: 1.5px solid #BFBDB7;
      display: inline-flex; align-items: center; justify-content: center;
      background: #fff; flex-shrink: 0;
    }
    .check-box.is-on { background: var(--brand); border-color: var(--brand); }
    .check-box.is-on::after {
      content: ''; width: 9px; height: 5px; border-left: 2px solid #fff; border-bottom: 2px solid #fff;
      transform: rotate(-45deg) translate(1px, -1px);
    }
    .role-row.is-off { opacity: 0.55; }

    /* Per-role rows have a uniform height on desktop so cells line up regardless
       of which control (dropdown vs. checkboxes vs. toggle) they contain. */
    .per-role-row { min-height: 55px; }

    /* ============ Mobile responsive (<= 768px) ============ */
    .mobile-only { display: none; }
    .gallery-header-mobile { display: none; }
    @media (max-width: 768px) {
      .mobile-only { display: flex !important; }
      .desktop-only { display: none !important; }
      .zenfolio-nav { display: none !important; }
      /* Desktop top bar is replaced on mobile by the black gallery header */
      .top-bar { display: none !important; }
      .gallery-header { display: none !important; }
      .gallery-header-mobile { display: block !important; }
      .tabs-row {
        padding-left: 16px !important; padding-right: 16px !important;
        overflow-x: auto; -webkit-overflow-scrolling: touch;
        flex-wrap: nowrap !important;
        gap: 16px !important;
        justify-content: space-between;
      }
      .tabs-row .tab-btn { font-size: 16px !important; padding: 14px 4px !important; }
      .tabs-row .tab-btn.is-active { color: var(--brand) !important; font-weight: 700 !important; }
      .tabs-row .tab-btn.is-active::after { left: 0 !important; right: 0 !important; height: 3px !important; }
      .tabs-row::-webkit-scrollbar { display: none; }
      .layout-pane { flex-direction: column !important; }
      .inner-sidebar { display: none !important; }
      .main-pane {
        padding: 12px !important;
        max-width: 100% !important;
      }
      .gallery-features-header {
        flex-direction: column !important;
        align-items: stretch !important;
        gap: 12px !important;
      }
      .gallery-features-header > button { align-self: flex-start; }
      /* Feature row on mobile uses card stack instead of grid */
      .feature-row-mobile {
        display: flex !important;
        align-items: center !important;
        gap: 8px !important;
        padding: 16px 14px !important;
        background: transparent !important;
        cursor: pointer;
      }
      .feature-row-mobile.is-open { background: var(--soft-bg) !important; }
      /* Multi-role panel padding */
      .multi-panel-strip { padding-left: 14px !important; padding-right: 14px !important; }
      .multi-panel-body { padding-left: 14px !important; padding-right: 14px !important; }
      /* Per-role table rows: stack label/control */
      .per-role-row {
        grid-template-columns: 1fr !important;
        gap: 8px !important;
        padding: 12px !important;
        min-height: 0 !important;
      }
      .per-role-row .control-cell { justify-content: flex-start !important; }
      .per-role-row select { width: 100% !important; min-width: 0 !important; }
      /* Shared row: stack */
      .shared-flat-row {
        grid-template-columns: 1fr !important;
        gap: 10px !important;
        align-items: stretch !important;
      }
      .shared-flat-row select { width: 100% !important; min-width: 0 !important; }
      .shared-flat-row .control-end { justify-content: flex-start !important; }
      /* Customize per role band wraps */
      .panel-strip { flex-wrap: wrap; row-gap: 8px; }
      .show-off-btn span:not([class]) { display: none; }
      /* Modal card */
      .modal-card { max-width: 95vw !important; padding: 18px !important; }
      /* Contacts form */
      .contacts-form-grid { grid-template-columns: 1fr !important; }
      .contacts-add-buttons { flex-direction: column; align-items: stretch !important; }
      .contacts-add-buttons > button,
      .contacts-add-buttons > div { width: 100%; }
      .contacts-add-buttons > div > button { width: 100%; }
      /* Mobile section nav */
      .mobile-section-nav { display: flex !important; }
      .features-header-h1 { font-size: 16px !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    // ===== Responsive helper =====
    function useIsMobile() {
      const [isMobile, setIsMobile] = useState(() =>
        typeof window !== 'undefined' && window.matchMedia('(max-width: 768px)').matches
      );
      useEffect(() => {
        const mq = window.matchMedia('(max-width: 768px)');
        const handler = (e) => setIsMobile(e.matches);
        mq.addEventListener('change', handler);
        return () => mq.removeEventListener('change', handler);
      }, []);
      return isMobile;
    }

    // ===== Icons =====
    const Icon = ({ d, size = 18, stroke = 1.6 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round">
        {Array.isArray(d) ? d.map((p, i) => <path key={i} d={p} />) : <path d={d} />}
      </svg>
    );
    const LockIcon = (p) => <Icon {...p} d={["M5 11h14v9H5z", "M8 11V7a4 4 0 0 1 8 0v4"]} />;
    const FeaturesIcon = (p) => <Icon {...p} d={["M4 5h16v14H4z","M8 10l3 3 5-5"]} />;
    const PeopleIcon = (p) => <Icon {...p} d={["M9 11a3 3 0 1 0 0-6 3 3 0 0 0 0 6z", "M16 11a3 3 0 1 0 0-6 3 3 0 0 0 0 6z", "M3 20c0-3 3-5 6-5s6 2 6 5", "M15 15c2 0 6 2 6 5"]} />;
    const CartIcon = (p) => <Icon {...p} d={["M3 4h2l2 12h12l2-9H6", "M9 20a1 1 0 1 0 0-2 1 1 0 0 0 0 2z", "M17 20a1 1 0 1 0 0-2 1 1 0 0 0 0 2z"]} />;
    const PresetIcon = (p) => <Icon {...p} d={["M3 5h14M3 12h12M3 19h14","M19 5h2M17 12h4M19 19h2"]} />;
    const UserIcon = (p) => <Icon {...p} d={["M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8z", "M4 21c0-4 4-7 8-7s8 3 8 7"]} />;
    const StarIcon = (p) => <Icon {...p} d="M12 3l2.7 5.5 6.1.9-4.4 4.3 1 6.1L12 17l-5.4 2.8 1-6.1L3.2 9.4l6.1-.9L12 3z" />;
    const SlidersIcon = (p) => <Icon {...p} d={["M4 6h10","M18 6h2","M4 12h4","M12 12h8","M4 18h12","M20 18h0","M16 4v4","M10 10v4","M14 16v4"]} />;
    const PencilIcon = (p) => <Icon {...p} d={["M4 20h4l10-10-4-4L4 16v4z","M14 6l4 4"]} />;
    const KebabIcon = ({ size = 14 }) => (
      <svg width={size} height={size} viewBox="0 0 16 16" fill="currentColor">
        <circle cx="8" cy="3" r="1.4"/>
        <circle cx="8" cy="8" r="1.4"/>
        <circle cx="8" cy="13" r="1.4"/>
      </svg>
    );
    const ChevronRight = ({ size = 14 }) => <svg width={size} height={size} viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M6 4l4 4-4 4"/></svg>;
    const ChevronLeft = ({ size = 14 }) => <svg width={size} height={size} viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 4l-4 4 4 4"/></svg>;
    const ChevronDown = ({ size = 14 }) => <svg width={size} height={size} viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M4 6l4 4 4-4"/></svg>;
    const CloseIcon = ({ size = 18 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>;
    const CopyIcon = ({ size = 18 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>;
    const TrashIcon = ({ size = 18 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M6 6l1 14a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-14"/></svg>;
    const PlusUserIcon = ({ size = 18 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><path d="M16 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"/><path d="M3 21c0-4 3.5-6 7-6"/><path d="M19 14v6M16 17h6"/></svg>;
    const BellIcon = (p) => <Icon {...p} d={["M6 8a6 6 0 1 1 12 0c0 7 3 9 3 9H3s3-2 3-9","M9 21a3 3 0 0 0 6 0"]} />;
    const BookIcon = (p) => <Icon {...p} d={["M4 4h13a3 3 0 0 1 3 3v13H7a3 3 0 0 1-3-3V4z","M4 4v13"]} />;
    const DashIcon = (p) => <Icon {...p} d={["M3 12l9-9 9 9","M5 10v10h14V10"]} />;
    const GalleryIcon = (p) => <Icon {...p} d={["M3 5h18v12H3z","M3 13l5-5 6 6 3-3 4 4"]} />;
    const SellIcon = (p) => <Icon {...p} d={["M12 2v20","M17 6H9.5a3 3 0 0 0 0 6h5a3 3 0 0 1 0 6H6"]} />;
    const ReportIcon = (p) => <Icon {...p} d={["M3 20h18","M6 16v-6","M11 16V8","M16 16v-9"]} />;
    const CrmIcon = (p) => <Icon {...p} d={["M21 15a4 4 0 0 1-4 4H8l-5 4V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4v8z"]} />;
    const WebsiteIcon = (p) => <Icon {...p} d={["M2 12a10 10 0 1 0 20 0 10 10 0 0 0-20 0z","M2 12h20","M12 2a14 14 0 0 1 0 20","M12 2a14 14 0 0 0 0 20"]} />;
    const BlogIcon = (p) => <Icon {...p} d={["M5 4h11l4 4v12H5z","M14 4v5h5"]} />;
    const SeoIcon = (p) => <Icon {...p} d={["M11 18a7 7 0 1 1 0-14 7 7 0 0 1 0 14z","M16 16l5 5"]} />;
    const AddOnsIcon = (p) => <Icon {...p} d={["M4 4h6v6H4z","M14 4h6v6h-6z","M4 14h6v6H4z","M14 14h6v6h-6z"]} />;
    const SupportIcon = (p) => <Icon {...p} d={["M12 21a9 9 0 1 0 0-18 9 9 0 0 0 0 18z","M9.5 9.5a2.5 2.5 0 0 1 5 0c0 2-2.5 2-2.5 4","M12 17v.01"]} />;
    // Feature icons (Photo / Video)
    const ImageIcon = ({ size = 20, color = '#757575' }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M19.3838 3.00977C20.2915 3.10184 20.9999 3.86784 21 4.7998V19.2002L20.9902 19.3838C20.9043 20.2311 20.2311 20.9043 19.3838 20.9902L19.2002 21H4.7998C3.86784 20.9999 3.10184 20.2915 3.00977 19.3838L3 19.2002V4.7998C3.00011 3.80585 3.80585 3.00011 4.7998 3H19.2002L19.3838 3.00977ZM8.2998 10.5742C8.22241 10.6 8.1487 10.6423 8.09082 10.6836C8.07313 10.6962 8.0581 10.7077 8.04688 10.7168L4.5 15.1504V19.2002C4.50011 19.3657 4.63427 19.4999 4.7998 19.5H19.2002C19.3657 19.4999 19.4999 19.3657 19.5 19.2002V17.8535L16.0723 14.0449L14.376 16.0801C14.2335 16.251 14.0224 16.3496 13.7998 16.3496C13.5773 16.3496 13.3661 16.251 13.2236 16.0801L8.74805 10.71C8.62704 10.5952 8.53958 10.5652 8.49219 10.5557C8.4366 10.5445 8.37415 10.5494 8.2998 10.5742ZM4.7998 4.5C4.63427 4.50011 4.50011 4.63427 4.5 4.7998V12.749L6.91406 9.73145C6.93466 9.7057 6.95696 9.68127 6.98047 9.6582C7.00269 9.63707 7.02566 9.61678 7.04883 9.59668C7.0903 9.56074 7.1478 9.51357 7.21875 9.46289C7.35767 9.36368 7.56537 9.23801 7.8252 9.15137C8.08832 9.06366 8.41987 9.01171 8.78613 9.08496C9.15793 9.15932 9.51228 9.35213 9.83008 9.66992C9.84605 9.6859 9.86151 9.70238 9.87598 9.71973L13.7998 14.4287L15.4736 12.4199C15.6129 12.2528 15.8186 12.1545 16.0361 12.1504C16.2535 12.1464 16.462 12.2368 16.6074 12.3984L19.5 15.6123V4.7998C19.4999 4.63427 19.3657 4.50011 19.2002 4.5H4.7998ZM16.0498 6.15039C17.0439 6.15039 17.8496 6.95608 17.8496 7.9502C17.8495 8.94423 17.0439 9.75 16.0498 9.75C15.0558 9.74989 14.2501 8.94416 14.25 7.9502C14.25 6.95615 15.0558 6.1505 16.0498 6.15039ZM16.0498 7.0498C15.5528 7.04991 15.1504 7.4532 15.1504 7.9502C15.1505 8.44711 15.5529 8.8495 16.0498 8.84961C16.5468 8.84961 16.9501 8.44717 16.9502 7.9502C16.9502 7.45314 16.5469 7.0498 16.0498 7.0498Z" fill={color}/>
      </svg>
    );
    const VideoIcon = ({ size = 20, color = '#757575' }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M15.0078 3.24805L16.4043 4.7998H18.9502C20.3542 4.79991 21.4998 5.94564 21.5 7.34961V18.1504C21.4998 19.5544 20.3542 20.7001 18.9502 20.7002H4.5498C3.14581 20.7001 2.00021 19.5544 2 18.1504V7.34961C2.00021 5.94564 3.14581 4.79991 4.5498 4.7998H7.0957L8.49219 3.24805L8.71582 3H14.7842L15.0078 3.24805ZM7.9873 6.05176L7.76367 6.2998H4.5498C3.97424 6.29991 3.50021 6.77406 3.5 7.34961V18.1504C3.50021 18.7259 3.97424 19.2001 4.5498 19.2002H18.9502C19.5258 19.2001 19.9998 18.7259 20 18.1504V7.34961C19.9998 6.77406 19.5258 6.29991 18.9502 6.2998H15.7363L15.5127 6.05176L14.1162 4.5H9.38379L7.9873 6.05176ZM11.75 8C14.4042 8 16.5 10.0958 16.5 12.75C16.5 15.4042 14.4042 17.5 11.75 17.5C9.09579 17.5 7 15.4042 7 12.75C7 10.0958 9.09579 8 11.75 8ZM11.75 9.5C9.92421 9.5 8.5 10.9242 8.5 12.75C8.5 14.5758 9.92421 16 11.75 16C13.5758 16 15 14.5758 15 12.75C15 10.9242 13.5758 9.5 11.75 9.5Z" fill={color}/>
      </svg>
    );
    const FeatureIcon = ({ name }) => {
      if (name === 'image') return <ImageIcon />;
      if (name === 'video') return <VideoIcon />;
      return null;
    };

    // ===== Initial data =====
    const FEATURE_DEFS = [
      { id: 'photo-downloads', name: 'Photo Downloads', icon: 'image',
        settings: [
          { id: 'download-type', type: 'select', label: 'Download Type Allowed',
            options: ['Full Gallery & Individual Download', 'Full Gallery Download', 'Specific Amount Download', 'Individual Download Only'],
            def: 'Full Gallery & Individual Download' },
          { id: 'specific-amount', type: 'number', label: 'Number of images allowed',
            placeholder: 'e.g. 25', def: 10, min: 1,
            dependsOn: { settingId: 'download-type', values: ['Specific Amount Download'] } },
          { id: 'gallery-resolutions', type: 'multicheck', label: 'Gallery Allowed Resolutions',
            options: ['Original','High','Medium','Low'], def: ['Original'],
            dependsOn: { settingId: 'download-type', values: ['Full Gallery & Individual Download', 'Full Gallery Download', 'Specific Amount Download'] } },
          { id: 'individual-resolution', type: 'select', label: 'Individual Allowed Resolution',
            options: ['Original','High','Medium','Low'], def: 'Original',
            dependsOn: { settingId: 'download-type', values: ['Full Gallery & Individual Download', 'Individual Download Only'] } },
          { id: 'license', type: 'toggle', optional: true,
            label: 'Digital photo license agreement (OPTIONAL)',
            meta: 'Apply a license to all digital photos downloaded from this gallery.\nManage license in Selling Settings.',
            def: false },
        ],
      },
      { id: 'video-downloads', name: 'Video Downloads', icon: 'video',
        settings: [
          { id: 'video-download-type', type: 'select', label: 'Video Download Type',
            options: ['All Videos', 'Specific Amount'],
            def: 'All Videos' },
          { id: 'video-specific-amount', type: 'number', label: 'Number of videos allowed',
            placeholder: 'e.g. 5', def: 5, min: 1,
            dependsOn: { settingId: 'video-download-type', values: ['Specific Amount'] } },
          { id: 'video-resolutions', type: 'multicheck', label: 'Video Download Resolutions',
            options: ['Original','1080p Full HD'], def: ['Original'],
            dependsOn: { settingId: 'video-download-type', values: ['All Videos', 'Specific Amount'] } },
        ],
      },
      { id: 'keyword-search', name: 'Keyword Search',
        settings: [
          { id: 'placeholder', type: 'text', label: 'Search bar placeholder',
            def: 'Search the contents of this gallery…' },
          { id: 'collapse', type: 'check', label: 'Collapse on page load', def: true, on: 'Enabled',
            dependsOn: { settingId: 'placeholder' } },
        ],
      },
      { id: 'favorites', name: 'Favorites', settings: [] },
      { id: 'commenting', name: 'Commenting', settings: [] },
      { id: 'sharing', name: 'Sharing', settings: [] },
      { id: 'face-finder', name: 'Face Finder', settings: [] },
    ];

    const PRESETS = {
      guest: { name: 'Guest', icon: UserIcon, title: 'GUEST',
        desc: 'Favorites, sharing, face finder & keyword search enabled',
        enabled: ['favorites', 'sharing', 'face-finder', 'keyword-search'] },
      client: { name: 'Client', icon: StarIcon, title: 'CLIENT',
        desc: 'All features enabled by default', enabled: 'all' },
      custom: { name: '', icon: SlidersIcon, title: 'CREATE YOUR OWN',
        desc: 'Start from scratch and configure permissions yourself', enabled: [] },
    };

    const buildRoleState = (presetId) => {
      const preset = PRESETS[presetId];
      const state = {};
      FEATURE_DEFS.forEach(f => {
        const enabled = preset.enabled === 'all' ? true : preset.enabled.includes(f.id);
        const values = {};
        f.settings.forEach(s => { values[s.id] = Array.isArray(s.def) ? [...s.def] : s.def; });
        state[f.id] = { enabled, values };
      });
      return state;
    };

    const buildEveryoneState = () => {
      // Default state: every feature is OFF for the Everyone role.
      const state = {};
      FEATURE_DEFS.forEach(f => {
        const values = {};
        f.settings.forEach(s => { values[s.id] = Array.isArray(s.def) ? [...s.def] : s.def; });
        state[f.id] = { enabled: false, values };
      });
      return state;
    };

    // Each feature is rendered per-role unconditionally; no shared/per-role toggle exists.
    const initialFeatures = FEATURE_DEFS.map(f => ({ ...f }));

    // Some settings are only relevant when another setting has a particular value
    // (e.g. Gallery Allowed Resolutions only matters when Download Type = Full Gallery + Individual).
    const isSettingVisibleForRole = (setting, roleId, featureId, perRole) => {
      if (!setting.dependsOn) return true;
      const dep = setting.dependsOn;
      const allowed = Array.isArray(dep.values)
        ? dep.values
        : (dep.value !== undefined ? [dep.value] : null);
      // dependsOn without a value constraint is purely structural — used so the child
      // setting nests under its parent in the rendered UI without affecting visibility.
      if (allowed === null) return true;
      const depVal = perRole[roleId]?.[featureId]?.values?.[dep.settingId];
      return allowed.includes(depVal);
    };

    // ===== Per-role summary helper =====
    // Generates a short, human-readable summary of how a feature is configured for a
    // given role (e.g. "10 images · Original"), so the matrix shows context — not just
    // ON/OFF — when guests and clients have different limits or resolutions.
    const SHORT_SELECT_LABELS = {
      'Full Gallery & Individual Download': 'Full + Individual',
      'Full Gallery Download': 'Full gallery',
      'Specific Amount Download': 'Limited',
      'Individual Download Only': 'Individual only',
      'All Videos': 'All videos',
      'Specific Amount': 'Limited',
    };
    // Per-feature verb phrases for the dynamic status sentences shown under each feature title.
    // Each feature defines an "on with summary" prefix, an "on without summary" fallback,
    // and a negative phrase used when the feature is off for the role group.
    const FEATURE_VERBS = {
      'photo-downloads': { onWith: 'can download', onBare: 'can download photos', off: 'cannot download photos' },
      'video-downloads': { onWith: 'can download videos:', onBare: 'can download videos', off: 'cannot download videos' },
      'keyword-search':  { onWith: 'can search by keyword', onBare: 'can search by keyword', off: 'cannot search by keyword' },
      'favorites':       { onWith: 'can mark favorites', onBare: 'can mark favorites', off: 'cannot use favorites' },
      'commenting':      { onWith: 'can comment',       onBare: 'can comment',         off: 'cannot comment' },
      'sharing':         { onWith: 'can share',         onBare: 'can share',           off: 'cannot share' },
      'face-finder':     { onWith: 'can use Face Finder', onBare: 'can use Face Finder', off: 'cannot use Face Finder' },
    };
    const joinNames = (names) => {
      if (names.length === 0) return '';
      if (names.length === 1) return names[0];
      if (names.length === 2) return `${names[0]} & ${names[1]}`;
      return names.slice(0, -1).join(', ') + ' & ' + names[names.length - 1];
    };
    // Build grouped human-readable status lines for a feature. Roles with the same effective
    // configuration collapse into one sentence — e.g. "Everyone & Client can download Full + Individual".
    // Only positive (enabled) groups are listed; off-roles are inferred from their unticked toggle.
    const buildFeatureStatusLines = (feature, roles, perRole) => {
      const groups = new Map();
      roles.forEach(r => {
        const enabled = !!perRole[r.id]?.[feature.id]?.enabled;
        if (!enabled) return;
        const summary = summarizeFeatureForRole(feature, r.id, perRole);
        const key = `on:${summary}`;
        if (!groups.has(key)) groups.set(key, { summary, names: [] });
        groups.get(key).names.push(r.name);
      });
      const verbs = FEATURE_VERBS[feature.id] || { onWith: 'can use', onBare: 'can use' };
      const ordered = Array.from(groups.values()).sort((a, b) => (a.summary ? 0 : 1) - (b.summary ? 0 : 1));
      return ordered.map(g => {
        const names = joinNames(g.names);
        return g.summary ? `${names} ${verbs.onWith} ${g.summary}` : `${names} ${verbs.onBare}`;
      });
    };

    const summarizeFeatureForRole = (feature, roleId, perRole) => {
      const data = perRole[roleId]?.[feature.id];
      if (!data || !data.enabled) return '';
      const values = data.values || {};
      const parts = [];
      feature.settings.forEach(s => {
        if (s.optional) return;
        if (s.type === 'multicheck') return; // skip resolutions/multi-check lists from the summary
        if (/resolution/i.test(s.id) || /resolution/i.test(s.label || '')) return; // skip any resolution setting
        if (!isSettingVisibleForRole(s, roleId, feature.id, perRole)) return;
        const v = values[s.id];
        if (v === undefined || v === null || v === '') return;
        if (s.type === 'select') {
          parts.push(SHORT_SELECT_LABELS[v] || v);
        } else if (s.type === 'number') {
          const unit = s.id.includes('video') ? 'videos' : 'images';
          parts.push(`${v} ${unit}`);
        } else if (s.type === 'toggle') {
          if (v) parts.push(s.label.replace(/\s*\(OPTIONAL\)\s*/i, ''));

    const StatusPill = ({ on, state, fraction }) => {

      const common = { minWidth: 36, letterSpacing: '0.05em', boxSizing: 'border-box' };

      if (s === 'some') {
        // Single visual for any partial state — always render a 67% orange fill so
        // "partial" is unambiguously distinguishable from "all on" without needing
        // to encode the precise fraction. Tooltip still reports the exact count.
        return (

              position: 'relative',
              overflow: 'hidden',

              width: '67%',
              background: 'var(--brand)',
