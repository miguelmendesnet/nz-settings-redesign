              <>
                <h3 className="text-[13px] font-bold tracking-wider mb-2" style={{ color: 'var(--text-primary)' }}>NAME YOUR ROLE</h3>
                <p className="text-[13px] mb-4" style={{ color: 'var(--text-secondary)' }}>Choose a name your viewers won't see — it's just for you.</p>
                <input
                  autoFocus value={customName}
                  onChange={e => setCustomName(e.target.value)}
                  onKeyDown={e => { if (e.key === 'Enter' && trimmed && !nameTaken) goDetail('custom'); }}
                  placeholder="e.g. Family, VIP, Player" maxLength={32}
                  className="w-full text-[14px] px-3 py-2.5 rounded-md border bg-white outline-none"
                  style={{ borderColor: nameTaken ? 'var(--brand)' : 'var(--card-border)', color: 'var(--text-primary)' }} />
                {nameTaken && <p className="text-[12px] mt-2" style={{ color: 'var(--brand-deep)' }}>A role named "{trimmed}" already exists.</p>}
                <div className="flex justify-end gap-2 mt-5">
                  <button onClick={() => setStep('choose')}
                    className="text-[12px] font-bold tracking-wider px-4 py-2 rounded-md border bg-white"
                    style={{ borderColor: 'var(--card-border)', color: 'var(--text-primary)' }}>BACK</button>
                  <button disabled={!trimmed || nameTaken}
                    onClick={() => goDetail('custom')}
                    className="text-[12px] font-bold tracking-wider px-4 py-2 rounded-md text-white disabled:opacity-40"
                    style={{ background: 'var(--brand)' }}>NEXT</button>
                </div>
              </>
            )}
            {step === 'detail' && (
              <>
                <h3 className="text-[13px] font-bold tracking-wider mb-3" style={{ color: 'var(--text-primary)' }}>
                  ADD A {roleDisplayName.toUpperCase()} ROLE
                </h3>
                <div className="rounded-md px-3 py-2.5 mb-3 text-[13px]"
                  style={{ background: 'var(--soft-bg)', border: '1px solid var(--card-border)', color: 'var(--text-primary)' }}>
                  {roleDisplayName}
                </div>
                <p className="text-[13px] mb-3" style={{ color: 'var(--text-secondary)' }}>
                  Add your first contact to this role right now. <span style={{ color: 'var(--text-tertiary)' }}>(Optional)</span>
                </p>
                <ContactFields
                  first={firstName} setFirst={setFirstName}
                  last={lastName} setLast={setLastName}
                  email={contactEmail} setEmail={setContactEmail}
                  mobile={contactMobile} setMobile={setContactMobile}
                  emailPlaceholder="Email (required to add contact)"
                />
                <div className="flex justify-end gap-2 mt-5">
                  <button onClick={onClose}
                    className="text-[12px] font-bold tracking-wider px-4 py-2 rounded-md border bg-white"
                    style={{ borderColor: 'var(--card-border)', color: 'var(--text-primary)' }}>CANCEL</button>
                  <button onClick={submit}
                    className="text-[12px] font-bold tracking-wider px-4 py-2 rounded-md text-white"
                    style={{ background: 'var(--brand)' }}>CREATE ROLE</button>
                </div>
              </>
            )}
          </div>
        </div>
      );
    };

    // Modal shown when clicking a role label in the matrix header — adds a contact to that role.
    const AddContactToRoleModal = ({ role, onClose, onAdd }) => {
      const [first, setFirst] = useState('');
      const [last, setLast] = useState('');
      const [email, setEmail] = useState('');
      const [mobile, setMobile] = useState('');
      const canAdd = email.trim().length > 0;
      const upper = role.name.toUpperCase();
      return (
        <div className="modal-backdrop fixed inset-0 z-50 flex items-center justify-center px-4"
          style={{ background: 'rgba(27, 28, 31, 0.45)' }} onClick={onClose}>
          <div className="modal-card bg-white rounded-2xl border shadow-xl w-full max-w-[600px] p-6"
            style={{ borderColor: 'var(--card-border)' }} onClick={e => e.stopPropagation()}>
            <div className="flex items-start justify-between mb-4">
              <h3 className="text-[13px] font-bold tracking-wider flex items-center gap-2" style={{ color: 'var(--text-primary)' }}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                  <circle cx="9" cy="7" r="4" />
                  <line x1="19" y1="8" x2="19" y2="14" />
                  <line x1="22" y1="11" x2="16" y2="11" />
                </svg>
                ADD A {upper} TO THIS GALLERY
              </h3>
              <button onClick={onClose} aria-label="Close"
                style={{ color: 'var(--text-tertiary)' }} className="kebab-btn rounded p-1">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M3 3l10 10M13 3L3 13"/></svg>
              </button>
            </div>
            <ContactFields
              first={first} setFirst={setFirst}
              last={last} setLast={setLast}
              email={email} setEmail={setEmail}
              mobile={mobile} setMobile={setMobile}
            />
            <div className="my-5" style={{ borderTop: '1px solid var(--card-border)' }} />
            <div className="flex justify-end">
              <button onClick={() => { onAdd({ first, last, email, mobile }); onClose(); }}
                disabled={!canAdd}
                className="text-[12px] font-bold tracking-wider px-5 py-2.5 rounded-md disabled:opacity-40"
                style={{ background: canAdd ? 'var(--brand)' : 'var(--off-bg)', color: canAdd ? '#fff' : 'var(--off-text)' }}>
                ADD AS {upper}
              </button>
            </div>
          </div>
        </div>
      );
    };

    // ===== Role Kebab Menu =====
    const RoleMenu = ({ canRemove, onRename, onSaveLater, onDuplicate, onRemove }) => (
      <div className="menu-pop absolute right-0 top-full mt-1.5 z-40 bg-white rounded-md shadow-lg border min-w-[210px] py-1.5"
        style={{ borderColor: 'var(--card-border)' }} onClick={e => e.stopPropagation()}>
        <button onClick={onRename}
          className="menu-item w-full text-left text-[12px] font-bold tracking-wider px-4 py-2.5"
          style={{ color: 'var(--text-primary)' }}>RENAME</button>
        <button onClick={onSaveLater}
          className="menu-item w-full text-left text-[12px] font-bold tracking-wider px-4 py-2.5"
          style={{ color: 'var(--text-primary)' }}>SAVE FOR LATER USE</button>
        <button onClick={onDuplicate}
          className="menu-item w-full text-left text-[12px] font-bold tracking-wider px-4 py-2.5"
          style={{ color: 'var(--text-primary)' }}>DUPLICATE</button>
        {canRemove && (
          <button onClick={onRemove}
            className="menu-item-danger w-full text-left text-[12px] font-bold tracking-wider px-4 py-2.5"
            style={{ color: 'var(--danger)' }}>REMOVE</button>
        )}
      </div>
    );

    // ===== Role Actions Bottom Sheet (mobile) =====
    // iOS-style action sheet that slides up from the bottom on mobile.
    // Replaces the absolute-positioned RoleMenu dropdown which doesn't work
    // well on small screens (gets clipped, hard to reach with thumb, etc.).
    const RoleActionsSheet = ({ role, onClose, onAddContact, onRename, onSaveLater, onDuplicate, onRemove }) => {
      useEffect(() => {
        const prev = document.body.style.overflow;
        document.body.style.overflow = 'hidden';
        const onKey = (e) => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', onKey);
        return () => { document.body.style.overflow = prev; window.removeEventListener('keydown', onKey); };
      }, []);
      const Item = ({ icon, label, color, bg, danger, onClick }) => (
        <button type="button" onClick={onClick}
          className="sheet-item w-full flex items-center gap-3 px-4 py-3 text-left">
          <span className="flex items-center justify-center rounded-lg shrink-0"
            style={{ width: 32, height: 32, background: bg, color: color }}>
            {icon}
          </span>
          <span className="text-[15px] font-medium"
            style={{ color: danger ? 'var(--danger)' : 'var(--text-primary)' }}>{label}</span>
        </button>
      );
      return (
        <div className="fixed inset-0 z-[60] flex items-end justify-center"
          onClick={onClose}>
          <div className="sheet-backdrop absolute inset-0" style={{ background: 'rgba(0,0,0,0.4)' }} />
          <div className="sheet-panel relative w-full bg-white"
            style={{ borderTopLeftRadius: 16, borderTopRightRadius: 16, paddingBottom: 'env(safe-area-inset-bottom, 12px)', maxHeight: '85vh' }}
            onClick={(e) => e.stopPropagation()}>
            {/* Grab handle */}
            <div className="flex justify-center pt-2 pb-1">
              <div style={{ width: 36, height: 4, borderRadius: 2, background: '#D8D5CD' }} />
            </div>
            {/* Header */}
            <div className="flex items-center justify-between px-3 pt-2 pb-3 border-b"
              style={{ borderColor: 'var(--card-border)' }}>
              <button type="button" onClick={onClose}
                className="text-[15px] px-2 py-1"
                style={{ color: 'var(--brand)' }}>Cancel</button>
              <div className="text-[14px] font-bold uppercase tracking-wider truncate px-2"
                style={{ color: 'var(--text-primary)' }}>{role.name}</div>
              <div style={{ width: 56 }} />
            </div>
            {/* Actions */}
            <div className="py-2">
              <Item
                icon={<PlusUserIcon size={18} />}
                label={`Add contact to ${role.name}`}
                color="#FFFFFF" bg="var(--brand)"
                onClick={onAddContact} />
              <Item
                icon={<PencilIcon size={18} stroke={1.7} />}
                label="Rename"
                color="#FFFFFF" bg="#3B82F6"
                onClick={onRename} />
              <Item
                icon={<BookIcon size={18} stroke={1.7} />}
                label="Save for later use"
                color="#FFFFFF" bg="#F59E0B"
                onClick={onSaveLater} />
              <Item
                icon={<CopyIcon size={18} />}
                label="Duplicate"
                color="#FFFFFF" bg="#8B5CF6"
                onClick={onDuplicate} />
              {role.removable && (
                <Item
                  icon={<TrashIcon size={18} />}
                  label="Remove"
                  color="#FFFFFF" bg="var(--danger)"
                  danger
                  onClick={onRemove} />
              )}
            </div>
          </div>
        </div>
      );
    };

    // ===== Column Header =====
    const ColumnHeader = ({ role, contactCount = 0, isMenuOpen, onMenuToggle, isRenaming, onCommitRename, onCancelRename, onRename, onDuplicate, onRemove, onSaveLater, onAddContact }) => {
      const [tempName, setTempName] = useState(role.name);
      useEffect(() => { if (isRenaming) setTempName(role.name); }, [isRenaming, role.name]);

      return (
        <div className="relative flex items-center justify-center gap-1" style={{ color: 'var(--text-secondary)' }}>
          {isRenaming ? (
            <input autoFocus value={tempName}
              onChange={(e) => setTempName(e.target.value)}
              onClick={(e) => e.stopPropagation()}
              onBlur={() => onCommitRename(tempName)}
              onKeyDown={(e) => {
                e.stopPropagation();
                if (e.key === 'Enter') { e.preventDefault(); onCommitRename(tempName); }
                if (e.key === 'Escape') onCancelRename();
              }}
              className="text-[11px] font-bold uppercase tracking-wider w-[88px] text-center border-2 rounded px-1 py-0.5 outline-none"
              style={{ borderColor: 'var(--brand)', color: 'var(--text-primary)' }} maxLength={32} />
          ) : (
            <button type="button" onClick={(e) => { e.stopPropagation(); onAddContact && onAddContact(); }}
              className="text-[11px] font-bold uppercase tracking-wider truncate max-w-[140px] rounded px-1 py-0.5 hover:bg-black/5 transition-colors"
              title={`Add a ${role.name} to this gallery`}
              style={{ color: 'var(--text-secondary)' }}>
              {role.name}
              <span className="ml-1" style={{ color: 'var(--text-tertiary)', fontWeight: 600 }}>({contactCount})</span>
            </button>
          )}
          {!isRenaming && role.removable && (
            <button onClick={(e) => { e.stopPropagation(); onMenuToggle(); }}
              className="kebab-btn rounded p-1"
              style={{ color: 'var(--text-tertiary)' }}>
              <KebabIcon size={14} />
            </button>
          )}
          {isMenuOpen && role.removable && (
            <RoleMenu
              canRemove={role.removable}
              onRename={onRename}
              onSaveLater={onSaveLater}
              onDuplicate={onDuplicate}
              onRemove={onRemove}
            />
          )}
        </div>
      );
    };

    // ===== Setting Control =====
    const SettingControl = ({ s, value, onChange, disabled, compact }) => {
      if (s.type === 'check') {
        return (
          <label className="inline-flex items-center gap-2 text-[13px] cursor-pointer whitespace-nowrap">
            <span className={`check-box ${value ? 'is-on' : ''}`} />
            <input type="checkbox" checked={!!value} disabled={disabled}
              onChange={(e) => onChange(e.target.checked)}
              className="sr-only" />
            <span style={{ color: 'var(--text-primary)' }}>{s.on || 'Enabled'}</span>
          </label>
        );
      }
      if (s.type === 'toggle') {
        return <Toggle checked={!!value} onChange={() => onChange(!value)} disabled={disabled} size="md" />;
      }
      if (s.type === 'text') {
        return (
          <input type="text" value={value || ''} disabled={disabled}
            onChange={(e) => onChange(e.target.value)}
            className="text-[13px] rounded-md border bg-white px-3 py-2 outline-none"
            style={{ borderColor: 'var(--card-border)', minWidth: 240 }} />
        );
      }
      if (s.type === 'number') {
        return (
          <input type="number" min={s.min ?? 1}
            value={value === undefined || value === null ? '' : value}
            disabled={disabled}
            placeholder={s.placeholder}
            onChange={(e) => {
              const raw = e.target.value;
              if (raw === '') { onChange(''); return; }
              const n = parseInt(raw, 10);
              onChange(Number.isFinite(n) ? n : '');
            }}
            className="text-[13px] rounded-md border bg-white px-3 py-2 outline-none text-right"
            style={{ borderColor: 'var(--card-border)', width: 110 }} />
        );
      }
      if (s.type === 'select') {
        return (
          <div className="relative inline-block">
            <select value={value || ''} disabled={disabled}
              onChange={(e) => onChange(e.target.value)}
              className="text-[13px] rounded-md border bg-white pl-3 pr-9 py-2 outline-none appearance-none"
              style={{ borderColor: 'var(--card-border)', minWidth: compact ? 200 : 220, color: 'var(--text-primary)' }}>
              {s.options.map(o => <option key={o}>{o}</option>)}
            </select>
            <div className="absolute right-2.5 top-1/2 -translate-y-1/2 pointer-events-none" style={{ color: 'var(--text-secondary)' }}>
              <ChevronDown size={12} />
            </div>
          </div>
        );
      }
      if (s.type === 'multicheck') {
        return (
          <div className="flex items-center gap-5 flex-wrap">
            {s.options.map(opt => {
              const checked = (value || []).includes(opt);
              return (
                <label key={opt} className="inline-flex items-center gap-2 text-[13px] cursor-pointer">
                  <span className={`check-box ${checked ? 'is-on' : ''}`} />
                  <input type="checkbox" checked={checked} disabled={disabled}
                    onChange={() => {
                      const next = checked ? value.filter(v => v !== opt) : [...(value || []), opt];
                      onChange(next);
                    }}
                    className="sr-only" />
                  <span style={{ color: 'var(--text-primary)' }}>{opt}</span>
                </label>
              );
            })}
          </div>
        );
      }
      if (s.type === 'radio') {
        return (
          <div className="flex items-center gap-5 flex-wrap">
            {s.options.map(opt => {
              const checked = value === opt;
              return (
                <label key={opt} className="inline-flex items-center gap-2 text-[13px] cursor-pointer">
                  <span className={`radio-dot ${checked ? 'is-on' : ''}`} />
                  <input type="radio" checked={checked} disabled={disabled}
                    onChange={() => onChange(opt)}
                    className="sr-only" />
                  <span style={{ color: 'var(--text-primary)' }}>{opt}</span>
                </label>
              );
            })}
          </div>
        );
      }
      return null;
    };

    // ===== Settings panels =====
    // Single-role flat settings (no Set per role, no diff)
    // Children of dependent settings are rendered inline as indented sub-rows directly under
    // the parent setting they belong to.
    const SimpleSettingsBlock = ({ feature, role, perRole, onUpdate }) => {
      const visibleSettings = feature.settings.filter(s => isSettingVisibleForRole(s, role.id, feature.id, perRole));
      const topLevel = visibleSettings.filter(s => !s.dependsOn);
      const childrenOf = (id) => visibleSettings.filter(s => s.dependsOn?.settingId === id);
      return (
        <div className="multi-panel-body px-8 py-2" style={{ background: 'var(--soft-bg)', borderTop: '1px solid var(--card-border)' }}>
          {topLevel.map((s, i) => {
            const isToggle = s.type === 'toggle';
            const kids = childrenOf(s.id);
            const showDivider = !!s.optional && i !== 0;
            return (
              <div key={s.id}
                style={{
                  borderTop: showDivider ? '1px solid var(--card-border)' : 'none',
                  marginTop: showDivider ? 6 : 0,
                }}>
                <div className="shared-flat-row grid items-center gap-4"
                  style={{
                    gridTemplateColumns: '1fr auto',
                    padding: '14px 0',
                    alignItems: isToggle ? 'flex-start' : 'center',
                  }}>
                  <div>
                    <div className="text-[13px] font-medium" style={{ color: 'var(--text-primary)' }}>{s.label}</div>
                    {s.meta && (
                      <div className="text-[12px] mt-1 leading-relaxed" style={{ color: 'var(--text-secondary)', whiteSpace: 'pre-line' }}>
                        {s.meta}
                      </div>
                    )}
                  </div>
                  <div className="control-end flex">
                    <SettingControl s={s} value={perRole[role.id]?.[feature.id]?.values?.[s.id]} onChange={(v) => onUpdate(role.id, s.id, v)} compact />
                  </div>
                </div>
                {kids.map(c => (
                  <div key={c.id}
                    className="shared-flat-row grid items-center gap-4"
                    style={{
                      gridTemplateColumns: '1fr auto',
                      padding: '6px 0 12px 22px',
                      marginTop: -8,
                    }}>
                    <div className="flex items-center gap-1.5 text-[12px]" style={{ color: 'var(--text-secondary)' }}>
                      <span aria-hidden="true" style={{ color: 'var(--brand)', opacity: 0.7 }}>↳</span>
                      <span>{c.label}</span>
                    </div>
                    <div className="control-end flex">
                      <SettingControl s={c} value={perRole[role.id]?.[feature.id]?.values?.[c.id]} onChange={(v) => onUpdate(role.id, c.id, v)} compact />
                    </div>
                  </div>
                ))}
              </div>
            );
          })}
        </div>
      );
    };

    // Multi-role: shared row — single value applied to all roles. No per-row Set per role
    // (Set per role is now a feature-level button at the top of the panel).
    // Visible child settings (passed in `children`) render as indented sub-rows directly
    // attached to the parent so users don't have to scan further down for the dependent input.
    const SharedRowFlat = ({ s, value, onChangeAll, isFirst, children = [], childValues = {}, onChildShared }) => {
      const isToggle = s.type === 'toggle';
      const showDivider = !!s.optional && !isFirst;
      return (
        <div style={{
          borderTop: showDivider ? '1px solid var(--card-border)' : 'none',
          marginTop: showDivider ? 6 : 0,
        }}>
          <div className="shared-flat-row grid gap-3"
            style={{ gridTemplateColumns: '1fr auto',
                     padding: '14px 0',
                     alignItems: isToggle ? 'flex-start' : 'center' }}>
            <div>
              <div className="text-[13px] font-medium" style={{ color: 'var(--text-primary)' }}>{s.label}</div>
              {s.meta && (
                <div className="text-[12px] mt-1 leading-relaxed" style={{ color: 'var(--text-secondary)', whiteSpace: 'pre-line' }}>
                  {s.meta}
                </div>
              )}
            </div>
            <div className="control-end flex">
              <SettingControl s={s} value={value} onChange={onChangeAll} compact />
            </div>
          </div>
          {children.map(c => (
            <div key={c.id}
              className="shared-flat-row grid gap-3"
              style={{
                gridTemplateColumns: '1fr auto',
                padding: '6px 0 12px 22px',
                marginTop: -8,
                alignItems: 'center',
              }}>
              <div className="flex items-center gap-1.5 text-[12px]" style={{ color: 'var(--text-secondary)' }}>
                <span aria-hidden="true" style={{ color: 'var(--brand)', opacity: 0.7 }}>↳</span>
                <span>{c.label}</span>
              </div>
              <div className="control-end flex">
                <SettingControl s={c} value={childValues[c.id]} onChange={(v) => onChildShared && onChildShared(c.id, v)} compact />
              </div>
            </div>
          ))}
        </div>
      );
    };

    // Per-role stack for a single setting. Shows ALL roles (even those with the feature off)
    // so users can adjust their settings; OFF roles render with a greyed-out indicator.
    // Dependent settings (passed as `childSettings`) are rendered inline as indented sub-rows
    // tucked under the role they apply to, so a "Number of images allowed" input appears
    // immediately below the row whose dropdown selected "Specific Amount Download".
    const PerRoleGroup = ({ s, visibleRoles, perRole, featureId, onUpdate, isFirst, childSettings = [] }) => (
      <div style={{
        borderTop: !isFirst ? '1px solid var(--card-border)' : 'none',
        paddingTop: isFirst ? 14 : 18,
        paddingBottom: 14,
      }}>
        <div className="text-[13px] font-semibold mb-2" style={{ color: 'var(--text-primary)' }}>{s.label}</div>
        <div className="rounded-lg overflow-hidden bg-white" style={{ border: '1px solid var(--card-border)' }}>
          {visibleRoles.map((r, idx) => {
            const value = perRole[r.id]?.[featureId]?.values?.[s.id];
            const roleEnabled = !!perRole[r.id]?.[featureId]?.enabled;
            const visibleChildren = childSettings.filter(c => isSettingVisibleForRole(c, r.id, featureId, perRole));
            return (
              <React.Fragment key={r.id}>
                <div
                  className="role-row per-role-row grid items-center"
                  style={{
                    gridTemplateColumns: '160px 1fr',
                    padding: '10px 14px',
                    borderTop: idx > 0 ? '1px solid var(--card-border)' : 'none',
                    background: '#fff',
                  }}>
                  <div className="flex items-center gap-2 text-[11px] font-bold tracking-wider uppercase" style={{ color: 'var(--text-secondary)' }}>
                    <span className="rounded-full shrink-0"
                      style={{ width: 7, height: 7, background: 'var(--green)', opacity: roleEnabled ? 1 : 0.3 }} />
                    <span className="truncate" title={r.name}>{r.name}</span>
                  </div>
                  <div className="control-cell flex justify-end">
                    <SettingControl s={s} value={value} onChange={(v) => onUpdate(r.id, s.id, v)} compact />
                  </div>
                </div>
                {visibleChildren.map(c => (
                  <div key={c.id}
                    className="role-row per-role-row grid items-center child-row"
                    style={{
                      gridTemplateColumns: '160px 1fr',
                      padding: '8px 14px 10px 32px',
                      background: 'var(--soft-bg)',
                      minHeight: 0,
                    }}>
                    <div className="flex items-center gap-1.5 text-[11px] font-medium" style={{ color: 'var(--text-secondary)' }}>
                      <span aria-hidden="true" style={{ color: 'var(--brand)', opacity: 0.7 }}>↳</span>
                      <span className="truncate" title={c.label}>{c.label}</span>
                    </div>
                    <div className="control-cell flex justify-end">
                      <SettingControl s={c}
                        value={perRole[r.id]?.[featureId]?.values?.[c.id]}
                        onChange={(v) => onUpdate(r.id, c.id, v)} compact />
                    </div>
                  </div>
                ))}
              </React.Fragment>
            );
          })}
        </div>
      </div>
    );

    // Outlined orange action button used for "Set per role" / "Match across roles"
    const OutlineCtaBtn = ({ onClick, children }) => (
      <button onClick={onClick}
        className="text-[12px] font-medium px-4 py-2 rounded-md border transition-colors"
        style={{ borderColor: 'var(--brand)', background: 'var(--brand-cream)', color: 'var(--brand)' }}>
        {children}
      </button>
    );

    // Eye icons used by the "Show off roles" toggle inside per-role mode.
    const EyeIcon = ({ size = 14 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round">
        <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z" />
        <circle cx="12" cy="12" r="3" />
      </svg>
    );
    const EyeOffIcon = ({ size = 14 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round">
        <path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-6.5 0-10-7-10-7a18.4 18.4 0 0 1 4.06-5.06" />
        <path d="M9.9 4.24A10.94 10.94 0 0 1 12 4c6.5 0 10 7 10 7a18.4 18.4 0 0 1-2.16 3.19" />
        <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24" />
        <line x1="2" y1="2" x2="22" y2="22" />
      </svg>
    );

    // Multi-role expanded panel — per-role is always-on. Every setting renders for every
    // available role; OFF roles still appear (with a greyed indicator inside PerRoleGroup)
    // so users can configure them ahead of enabling. Optional/global settings (e.g. license)
    // remain a single shared row that applies across roles.
    const MultiRoleSettingsBlock = ({ feature, roles, perRole, onUpdate, onUpdateShared }) => {
      const mainSettings = feature.settings.filter(s => !s.optional);
      const optionalSettings = feature.settings.filter(s => s.optional);
      const refRoleId = roles[0].id;

      return (
        <div style={{ background: 'var(--soft-bg)', borderTop: '1px solid var(--card-border)' }}>
          <div className="multi-panel-body px-8 pt-4 pb-5">
            {(() => {
              // Render only top-level settings; dependent ones are nested inline
              // inside their parent group's role row (e.g. "Number of images allowed"
              // appears under the role whose Download Type is "Specific Amount Download").
              const topLevel = mainSettings.filter(s => !s.dependsOn);
              const childrenOf = (id) => mainSettings.filter(s => s.dependsOn?.settingId === id);
              const renderable = topLevel
                .map(s => ({
                  s,
                  visibleRoles: roles.filter(r => isSettingVisibleForRole(s, r.id, feature.id, perRole)),
                  childSettings: childrenOf(s.id),
                }))
                .filter(({ visibleRoles }) => visibleRoles.length > 0);
              if (renderable.length === 0) {
                return (
                  <div className="text-[12px] italic py-3" style={{ color: 'var(--text-tertiary)' }}>
                    No settings to configure for this feature.
                  </div>
                );
              }
              return renderable.map(({ s, visibleRoles, childSettings }, i) => (
                <PerRoleGroup key={s.id} s={s} visibleRoles={visibleRoles} perRole={perRole}
                  featureId={feature.id}
                  onUpdate={(rId, sId, v) => onUpdate(rId, sId, v)}
                  isFirst={i === 0} childSettings={childSettings} />
              ));
            })()}

            {optionalSettings.length > 0 && (
              <div style={{ borderTop: '1px solid var(--card-border)', marginTop: 6, paddingTop: 4 }}>
                {optionalSettings.map((s) => (
                  <SharedRowFlat key={s.id} s={s}
                    value={perRole[refRoleId]?.[feature.id]?.values?.[s.id]}
                    onChangeAll={(v) => onUpdateShared(s.id, v)}
                    isFirst />
                ))}
              </div>
            )}
          </div>
        </div>
      );
    };

    // ===== Matrix Row =====
    // Renders one feature in the matrix. On desktop this is a horizontal grid:
    // feature label on the left + a toggle column for every role.
    // On mobile we flip it to a stacked card so it fits a narrow viewport: feature header
    // on top (clickable to expand settings), and each role rendered as a label/toggle row.
    const MatrixRow = ({ feature, roles, perRole, isOpen, onToggleOpen, onToggleEnabled, gridCols, hasSettings, isMobile, onEditSettings }) => {
      if (isMobile) {
        // Mobile no longer expands inline — the "EDIT SETTINGS" link opens a full-screen modal
        // so users have a focused space to configure each feature. The role/toggle list still
        // renders below the feature header so on/off can be flipped without a detour.
        return (
          <div className="border-t" style={{ borderColor: 'var(--card-border)' }}>
            <div className="feature-row-mobile flex items-center gap-2">
              {feature.icon && (
                <span className="flex items-center justify-center" style={{ width: 20, height: 20 }}>
                  <FeatureIcon name={feature.icon} />
                </span>
              )}
              <div className="text-[14px] font-medium leading-tight flex-1" style={{ color: 'var(--text-primary)' }}>
                {feature.name}
              </div>
              {hasSettings && (
                <button onClick={onEditSettings}
                  className="text-[11px] font-bold uppercase tracking-wider px-2 py-1 rounded-md whitespace-nowrap"
                  style={{ color: 'var(--brand)' }}>
                  Edit settings
                </button>
              )}
            </div>
            <div className="px-3 pb-3 pt-1">
              <div className="rounded-md border bg-white" style={{ borderColor: 'var(--card-border)' }}>
                {roles.map((r, idx) => (
                  <div key={r.id}
                    className="flex items-center justify-between gap-3 px-3 py-2.5"
                    style={{ borderTop: idx > 0 ? '1px solid var(--card-border)' : 'none' }}>
                    <span className="text-[11px] font-bold uppercase tracking-wider truncate" style={{ color: 'var(--text-secondary)' }}>
                      {r.name}
                    </span>
                    <Toggle size="sm" checked={!!perRole[r.id]?.[feature.id]?.enabled}
                      onChange={() => onToggleEnabled(r.id)} />
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      }
      const statusLines = buildFeatureStatusLines(feature, roles, perRole);
      return (
        <div className="border-t" style={{ borderColor: 'var(--card-border)' }}>
          <div onClick={() => hasSettings && onToggleOpen()}
            className={`feature-row grid items-start${hasSettings ? ' is-collapsible' : ''}${isOpen ? ' is-open' : ''}`}
            style={{ gridTemplateColumns: gridCols, padding: '18px 0', cursor: hasSettings ? 'pointer' : 'default',
              background: isOpen ? 'var(--soft-bg)' : undefined }}>
            <div className="pl-6">
              <div className="flex items-center gap-2">
                <span style={{ color: 'var(--text-tertiary)', visibility: hasSettings ? 'visible' : 'hidden',
                  transform: isOpen ? 'rotate(90deg)' : 'none', transition: 'transform 0.15s' }}><ChevronRight /></span>
                {feature.icon && (
                  <span className="flex items-center justify-center" style={{ width: 20, height: 20 }}>
                    <FeatureIcon name={feature.icon} />
                  </span>
                )}
                <div className="text-[14px] font-medium leading-tight" style={{ color: 'var(--text-primary)' }}>
                  {feature.name}
                </div>
              </div>
              {statusLines.length > 0 && (
                <div className="mt-1.5 space-y-0.5" style={{ paddingLeft: 23 }}>
                  {statusLines.map((line, idx) => (
                    <div key={idx} className="text-[12px] leading-snug italic" style={{ color: 'var(--text-secondary)' }}>
                      {line}
                    </div>
                  ))}
                </div>
              )}
            </div>
            {roles.map(r => {
              const enabled = !!perRole[r.id]?.[feature.id]?.enabled;
              return (
                <div key={r.id} className="flex justify-center pt-1">
                  <Toggle size="sm" checked={enabled}
                    onChange={() => onToggleEnabled(r.id)} />
                </div>
              );
            })}
          </div>
        </div>
      );
    };

    // ===== Mobile Feature Settings Modal =====
    // Full-screen sheet that hosts a feature's settings when triggered from the mobile
    // matrix. Uses the same MultiRoleSettingsBlock / SimpleSettingsBlock components so
    // changes flow back through the same update callbacks. Lock body scroll while open.
    const MobileFeatureSettingsModal = ({ feature, roles, perRole, onClose, onUpdate, onUpdateShared }) => {
      useEffect(() => {
        const prev = document.body.style.overflow;
        document.body.style.overflow = 'hidden';
        return () => { document.body.style.overflow = prev; };
      }, []);
      const isMultiRole = roles.length > 1;
      return (
        <div className="fixed inset-0 z-50 flex flex-col bg-white" role="dialog" aria-modal="true">
          <header className="flex items-center justify-between px-3 h-14 border-b shrink-0"
            style={{ borderColor: 'var(--card-border)' }}>
            <button onClick={onClose} className="p-2 -ml-1 rounded-md" aria-label="Close" style={{ color: 'var(--text-primary)' }}>
              <CloseIcon size={20} />
            </button>
            <div className="flex items-center gap-2 flex-1 justify-center">
              {feature.icon && (
                <span className="flex items-center justify-center" style={{ width: 20, height: 20 }}>
                  <FeatureIcon name={feature.icon} />
                </span>
              )}
              <h2 className="text-[15px] font-extrabold tracking-tight truncate" style={{ color: 'var(--text-primary)' }}>
                {feature.name}
              </h2>
            </div>
            {/* Spacer to balance the close button so the title stays centered */}
            <div style={{ width: 36 }} />
          </header>
          <div className="flex-1 overflow-y-auto" style={{ background: 'var(--soft-bg)' }}>
            {isMultiRole ? (
              <MultiRoleSettingsBlock feature={feature} roles={roles} perRole={perRole}
                onUpdate={onUpdate} onUpdateShared={onUpdateShared} />
            ) : (
              <SimpleSettingsBlock feature={feature} role={roles[0]} perRole={perRole}
                onUpdate={onUpdate} />
            )}
          </div>
          <footer className="border-t bg-white p-3 shrink-0" style={{ borderColor: 'var(--card-border)' }}>
            <button onClick={onClose}
              className="w-full text-[12px] font-bold tracking-wider px-4 py-3 rounded-md text-white"
              style={{ background: 'var(--brand)' }}>
              DONE
            </button>
          </footer>
        </div>
      );
    };

    // ===== Contacts view =====
    const InfoCircle = ({ size = 13 }) => (
      <svg width={size} height={size} viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="8" cy="8" r="6.5" />
        <path d="M8 7.2v3.6M8 5.5v.01" />
      </svg>
    );
    const GearIcon = ({ size = 14 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="3" />
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
      </svg>
    );

    // Mobile section nav — replaces the inner sidebar on small screens.
    const MobileSectionNav = ({ activeSection, onSelectSection, contactsCount }) => (
      <div className="mobile-section-nav mobile-only mb-4 rounded-md p-1 bg-white border" style={{ borderColor: 'var(--card-border)' }}>
        {[
          { id: 'features', label: 'Gallery Features' },
          { id: 'contacts', label: `Contacts (${contactsCount})` },
        ].map(item => {
          const active = activeSection === item.id;
          return (
            <button key={item.id} onClick={() => onSelectSection(item.id)}
              className="flex-1 text-[11px] font-bold tracking-wider uppercase py-2 rounded transition-colors"
              style={{
                background: active ? 'var(--brand-cream)' : 'transparent',
                color: active ? 'var(--brand)' : 'var(--text-secondary)',
              }}>
              {item.label}
            </button>
          );
        })}
      </div>
    );

    const ContactsView = ({ contacts, roles, onAdd, onRemoveContact, activeSection, onSelectSection }) => {
      const isMobile = useIsMobile();
      const [first, setFirst] = useState('');
      const [last, setLast] = useState('');
      const [email, setEmail] = useState('');
      const [mobile, setMobile] = useState('');
      const [tab, setTab] = useState('manual');
      const [moreOpen, setMoreOpen] = useState(false);

      // Close MORE ROLES dropdown on outside click
      useEffect(() => {
        if (!moreOpen) return;
        const handler = () => setMoreOpen(false);
        document.addEventListener('click', handler);
        return () => document.removeEventListener('click', handler);
      }, [moreOpen]);

      const everyone = roles.find(r => r.id === 'everyone');
      const otherRoles = roles.filter(r => r.id !== 'everyone');
      const inlineRoles = otherRoles.slice(0, 2);
      const overflowRoles = otherRoles.slice(2);

      const canAdd = email.trim().length > 0;
      const reset = () => { setFirst(''); setLast(''); setEmail(''); setMobile(''); };
      const submit = (roleId) => {
        if (!canAdd) return;
        onAdd({
          first: first.trim(), last: last.trim(),
          email: email.trim(), mobile: mobile.trim(),
          roleId,
        });
        reset();
        setMoreOpen(false);
      };

      const SolidBtn = ({ onClick, children, disabled }) => (
        <button onClick={onClick} disabled={disabled}
          className="text-[12px] font-bold tracking-wider px-4 py-2.5 rounded-md text-white disabled:opacity-40 transition-opacity"
          style={{ background: 'var(--brand)' }}>
          {children}
        </button>
      );

      return (
        <main className="main-pane flex-1 px-6 pt-6 pb-12" style={{ maxWidth: 920 }}>
          <MobileSectionNav activeSection={activeSection}
            onSelectSection={onSelectSection} contactsCount={contacts.length} />
          <h1 className="features-header-h1 text-[18px] font-extrabold tracking-tight uppercase mb-4" style={{ color: 'var(--text-primary)', letterSpacing: '0.02em' }}>Contacts</h1>

          {/* Sub-tabs */}
          <div className="flex items-center gap-6 border-b mb-5" style={{ borderColor: 'var(--card-border)' }}>
            {[
              { id: 'manual', label: 'Add Manually' },
              { id: 'from-contacts', label: 'Add from Contacts', disabled: true },
              { id: 'csv', label: 'Import CSV', disabled: true },
            ].map(t => (
              <button key={t.id}
                onClick={() => !t.disabled && setTab(t.id)}
                className="relative text-[13px] py-2 transition-colors"
                style={{
                  color: tab === t.id ? 'var(--text-primary)' : 'var(--text-secondary)',
                  fontWeight: tab === t.id ? 700 : 500,
                  cursor: t.disabled ? 'not-allowed' : 'pointer',
                  opacity: t.disabled ? 0.6 : 1,
                }}>
                {t.label}
                {tab === t.id && (
                  <span style={{ position: 'absolute', left: 0, right: 0, bottom: -1, height: 2, background: 'var(--brand)' }} />
                )}
              </button>
            ))}
          </div>

          {tab !== 'manual' ? (
            <div className="text-[13px] py-10 text-center" style={{ color: 'var(--text-secondary)' }}>
              {tab === 'from-contacts' ? 'Add from Contacts is not implemented in this prototype.' : 'CSV Import is not implemented in this prototype.'}
            </div>
          ) : (
            <>
              <div className="contacts-form-grid grid grid-cols-2 gap-3 mb-3">
                <input value={first} onChange={e => setFirst(e.target.value)} placeholder="First Name"
                  className="text-[13px] px-3 py-2.5 rounded-md border bg-white outline-none"
                  style={{ borderColor: 'var(--card-border)', color: 'var(--text-primary)' }} />
                <input value={last} onChange={e => setLast(e.target.value)} placeholder="Last Name"
                  className="text-[13px] px-3 py-2.5 rounded-md border bg-white outline-none"
                  style={{ borderColor: 'var(--card-border)', color: 'var(--text-primary)' }} />
                <input value={email} onChange={e => setEmail(e.target.value)} type="email" placeholder="Email"
                  className="text-[13px] px-3 py-2.5 rounded-md border bg-white outline-none"
                  style={{ borderColor: 'var(--card-border)', color: 'var(--text-primary)' }} />
                <div className="flex rounded-md border bg-white overflow-hidden" style={{ borderColor: 'var(--card-border)' }}>
                  <button type="button" tabIndex={-1} className="flex items-center gap-1 px-2 text-[12px]" style={{ background: '#F4F3EF', color: 'var(--text-secondary)' }}>
                    <span style={{ fontSize: 14 }}>🇺🇸</span><ChevronDown size={10} />
                  </button>
                  <input value={mobile} onChange={e => setMobile(e.target.value)} placeholder="Mobile Number"
                    className="flex-1 text-[13px] px-3 py-2.5 outline-none"
                    style={{ color: 'var(--text-primary)' }} />
                </div>
              </div>

              <div className="contacts-add-buttons flex items-center gap-3 mb-6 flex-wrap relative">
                <SolidBtn onClick={() => submit(everyone?.id)} disabled={!canAdd}>ADD</SolidBtn>
                {inlineRoles.map(r => (
                  <SolidBtn key={r.id} onClick={() => submit(r.id)} disabled={!canAdd}>
                    ADD AS {r.name.toUpperCase()}
                  </SolidBtn>
                ))}
                {overflowRoles.length > 0 && (
                  <div className="relative">
                    <button onClick={(e) => { e.stopPropagation(); canAdd && setMoreOpen(o => !o); }}
                      disabled={!canAdd}
                      className="flex items-center gap-2 text-[12px] font-bold tracking-wider px-4 py-2.5 rounded-md border bg-white disabled:opacity-40 transition-opacity"
                      style={{ borderColor: 'var(--brand)', color: 'var(--brand)' }}>
                      MORE ROLES <ChevronDown size={11} />
                    </button>
                    {moreOpen && canAdd && (
                      <div onClick={e => e.stopPropagation()}
                        className="menu-pop absolute left-0 top-full mt-1.5 z-30 bg-white rounded-md shadow-lg border min-w-[180px] py-1.5"
                        style={{ borderColor: 'var(--card-border)' }}>
                        {overflowRoles.map(r => (
                          <button key={r.id}
                            onClick={() => submit(r.id)}
                            className="menu-item w-full text-left text-[12px] font-bold tracking-wider px-4 py-2.5"
                            style={{ color: 'var(--text-primary)' }}>
                            ADD AS {r.name.toUpperCase()}
                          </button>
                        ))}
                      </div>
                    )}
                  </div>
                )}
              </div>
            </>
          )}

          {/* Contacts table — desktop grid / mobile card list */}
          <div className="rounded-xl border bg-white overflow-hidden" style={{ borderColor: 'var(--card-border)' }}>
            {isMobile ? (
              contacts.length === 0 ? (
                <div className="text-[13px] text-center py-10" style={{ color: 'var(--text-tertiary)' }}>
                  No contacts yet. Add one above.
                </div>
              ) : contacts.map((c, idx) => {
                const r = roles.find(rr => rr.id === c.roleId);
                return (
                  <div key={c.id} className="px-4 py-3" style={{ borderTop: idx > 0 ? '1px solid var(--card-border)' : 'none' }}>
                    <div className="flex items-start justify-between gap-2 mb-1">
                      <div className="flex flex-col min-w-0">
                        <span className="text-[14px] font-semibold truncate" style={{ color: 'var(--text-primary)' }}>
                          {(c.first || c.last) ? `${c.first || ''} ${c.last || ''}`.trim() : c.email}
                        </span>
                        <span className="text-[12px] truncate" style={{ color: 'var(--text-secondary)' }}>{c.email}</span>
                      </div>
                      <button onClick={() => onRemoveContact(c.id)} className="kebab-btn rounded p-1 shrink-0"
                        style={{ color: 'var(--text-tertiary)' }} title="Remove">
                        <KebabIcon size={14} />
                      </button>
                    </div>
                    <div className="flex items-center gap-3 text-[11px] mt-1.5 flex-wrap">
                      {c.mobile && (
                        <span style={{ color: 'var(--text-secondary)' }}>{c.mobile}</span>
                      )}
                      <span className="inline-flex items-center gap-1 font-bold tracking-wider uppercase rounded px-2 py-0.5"
                        style={{ background: 'var(--brand-cream)', color: 'var(--brand)' }}>
                        {r ? r.name : '—'}
                      </span>
                    </div>
                  </div>
                );
              })
            ) : (
              <>
                <div className="grid items-center text-[11px] font-bold tracking-wider uppercase"
                  style={{ gridTemplateColumns: '40px 1.2fr 1.2fr 2fr 1fr 1.2fr 1fr 40px',
                           padding: '12px 16px', color: 'var(--text-secondary)',
                           borderBottom: '1px solid var(--card-border)' }}>
                  <span><input type="checkbox" /></span>
                  <span>First Name</span>
                  <span>Last Name</span>
                  <span>Email</span>
                  <span>Mobile</span>
                  <span>Role</span>
                  <span>Reg Info</span>
                  <span style={{ color: 'var(--text-tertiary)' }}><GearIcon /></span>
                </div>
                {contacts.length === 0 ? (
                  <div className="text-[13px] text-center py-10" style={{ color: 'var(--text-tertiary)' }}>
                    No contacts yet. Add one above.
                  </div>
                ) : contacts.map(c => {
                  const r = roles.find(rr => rr.id === c.roleId);
                  return (
                    <div key={c.id} className="grid items-center text-[13px]"
                      style={{ gridTemplateColumns: '40px 1.2fr 1.2fr 2fr 1fr 1.2fr 1fr 40px',
                               padding: '14px 16px', borderTop: '1px solid var(--card-border)',
                               color: 'var(--text-primary)' }}>
                      <span><input type="checkbox" /></span>
                      <span className="flex items-center gap-2 min-w-0">
                        <span className="rounded-full" style={{ width: 6, height: 6, background: 'var(--text-tertiary)' }} />
                        <span className="truncate">{c.first || '-'}</span>
                      </span>
                      <span className="truncate">{c.last || '-'}</span>
                      <span className="truncate" title={c.email}>{c.email}</span>
                      <span style={{ color: 'var(--text-secondary)' }}>{c.mobile || '-'}</span>
                      <span className="flex items-center gap-1.5 text-[11px] font-bold tracking-wider uppercase" style={{ color: 'var(--text-secondary)' }}>
                        <span style={{ color: 'var(--text-tertiary)' }}><InfoCircle /></span>
                        <span className="truncate">{r ? r.name : '—'}</span>
                      </span>
                      <span style={{ color: 'var(--text-tertiary)' }}>-</span>
                      <button onClick={() => onRemoveContact(c.id)} className="kebab-btn rounded p-1 justify-self-center"
                        style={{ color: 'var(--text-tertiary)' }} title="Remove">
                        <KebabIcon size={14} />
                      </button>
                    </div>
                  );
                })}
              </>
            )}
          </div>

          <div className="flex items-center justify-between mt-4">
            <span className="text-[12px]" style={{ color: 'var(--text-secondary)' }}>{contacts.length} contacts</span>
            <div className="flex items-center gap-1">
              <button className="w-8 h-8 rounded-md border bg-white text-[12px]" style={{ borderColor: 'var(--card-border)', color: 'var(--text-secondary)' }}>‹</button>
              <button className="w-8 h-8 rounded-md border text-[12px] font-bold"
                style={{ borderColor: 'var(--brand)', color: 'var(--brand)', background: '#fff' }}>1</button>
              <button className="w-8 h-8 rounded-md border bg-white text-[12px]" style={{ borderColor: 'var(--card-border)', color: 'var(--text-secondary)' }}>›</button>
            </div>
          </div>
        </main>
      );
    };

    // ===== App =====
    function App() {
      const isMobile = useIsMobile();
      const [roles, setRoles] = useState([{ id: 'everyone', name: 'General', removable: false }]);
      const [perRole, setPerRole] = useState({ everyone: buildEveryoneState() });
      const [features, setFeatures] = useState(initialFeatures);
      const [openFeatures, setOpenFeatures] = useState(new Set());
      const [showModal, setShowModal] = useState(false);
      const [contactRoleId, setContactRoleId] = useState(null);
      const [openMenuRoleId, setOpenMenuRoleId] = useState(null);
      const [renamingRoleId, setRenamingRoleId] = useState(null);
      const [toast, setToast] = useState(null);
      const [contacts, setContacts] = useState([]);
      const [activeSection, setActiveSection] = useState('features'); // 'features' | 'contacts'
      const [mobileEditFeatureId, setMobileEditFeatureId] = useState(null);

      const addContact = (c) => {
        const id = `contact-${Date.now()}-${Math.random().toString(36).slice(2, 6)}`;
        setContacts(prev => [...prev, { id, ...c }]);
        const role = roles.find(r => r.id === c.roleId);
        showToast(`${c.first || c.email} added${role ? ' as ' + role.name : ''}`);
      };
      const removeContact = (id) => setContacts(prev => prev.filter(c => c.id !== id));

      // Click-outside-to-close for the desktop kebab dropdown only.
      // Mobile uses a bottom-sheet whose backdrop handles closing, and a document-level
      // click listener would race with the open-pill click and immediately re-close it.
      useEffect(() => {
        if (!openMenuRoleId || isMobile) return;
        const handler = () => setOpenMenuRoleId(null);
        document.addEventListener('click', handler);
        return () => document.removeEventListener('click', handler);
      }, [openMenuRoleId, isMobile]);

      const showToast = (msg) => {
        setToast(msg);
        setTimeout(() => setToast(null), 2500);
      };

      const gridCols = useMemo(() => {
        const w = roles.length <= 2 ? 130 : roles.length <= 4 ? 105 : 90;
        return `1fr repeat(${roles.length}, ${w}px)`;
      }, [roles.length]);

      const addRole = (presetId, customName, contact) => {
        const preset = PRESETS[presetId];
        const id = `role-${Date.now()}`;
        const name = customName || preset.name;
        setRoles([...roles, { id, name, removable: true }]);
        setPerRole({ ...perRole, [id]: buildRoleState(presetId) });
        setShowModal(false);
        if (contact && contact.email) {
          // Push the new contact into the shared contacts table, tagged with the new roleId.
          const cid = `contact-${Date.now()}-${Math.random().toString(36).slice(2, 6)}`;
          setContacts(prev => [...prev, {
            id: cid,
            first: contact.firstName || '',
            last: contact.lastName || '',
            email: contact.email,
            mobile: contact.mobile || '',
            roleId: id,
          }]);
          showToast(`"${name}" role created and ${contact.firstName || contact.email} added to Contacts`);
        } else {
          showToast(`"${name}" role created`);
        }
      };

      const removeRole = (roleId) => {
        if (roles.length <= 1) return;
        const removed = roles.find(r => r.id === roleId);
        setRoles(roles.filter(r => r.id !== roleId));
        const next = { ...perRole }; delete next[roleId]; setPerRole(next);
        if (removed) showToast(`"${removed.name}" removed`);
      };

      const renameRole = (roleId, newName) => {
        const trimmed = (newName || '').trim();
        if (!trimmed) { setRenamingRoleId(null); return; }
        if (roles.some(r => r.id !== roleId && r.name.toLowerCase() === trimmed.toLowerCase())) {
          showToast(`A role named "${trimmed}" already exists`);
          setRenamingRoleId(null);
          return;
        }
        setRoles(roles.map(r => r.id === roleId ? { ...r, name: trimmed } : r));
        setRenamingRoleId(null);
      };

      const duplicateRole = (roleId) => {
        const source = roles.find(r => r.id === roleId);
        if (!source) return;
        let newName = `${source.name} (copy)`;
        let counter = 2;
        while (roles.some(r => r.name.toLowerCase() === newName.toLowerCase())) {
          newName = `${source.name} (copy ${counter})`;
          counter++;
        }
        const newId = `role-${Date.now()}`;
        const cloneState = JSON.parse(JSON.stringify(perRole[roleId]));
        setRoles([...roles, { id: newId, name: newName, removable: true }]);
        setPerRole({ ...perRole, [newId]: cloneState });
      };

      const toggleEnabled = (featureId, roleId) => {
        setPerRole({
          ...perRole,
          [roleId]: {
            ...perRole[roleId],
            [featureId]: { ...perRole[roleId][featureId], enabled: !perRole[roleId][featureId].enabled },
          },
        });
      };

      const updateValue = (featureId, roleId, settingId, value) => {
        setPerRole({
          ...perRole,
          [roleId]: {
            ...perRole[roleId],
            [featureId]: {
              ...perRole[roleId][featureId],
              values: { ...perRole[roleId][featureId].values, [settingId]: value },
            },
          },
        });
      };

      const updateSharedValue = (featureId, settingId, value) => {
        const next = {};
        Object.keys(perRole).forEach(roleId => {
          next[roleId] = {
            ...perRole[roleId],
            [featureId]: {
              ...perRole[roleId][featureId],
              values: { ...perRole[roleId][featureId].values, [settingId]: value },
            },
          };
        });
        setPerRole(next);
      };

      const toggleOpen = (fId) => {
        // Multiple feature accordions can be open simultaneously. Toggle just the
        // clicked one without affecting others.
        setOpenFeatures(prev => {
          const next = new Set(prev);
          if (next.has(fId)) next.delete(fId); else next.add(fId);
          return next;
        });
      };

      const existingNames = roles.map(r => r.name.toLowerCase());
      const isMultiRole = roles.length > 1;

      return (
        <div className="min-h-screen flex flex-col" style={{ background: 'var(--page-bg)' }}>
          <TopBar />
          <div className="flex flex-1">
            <ZenfolioNav />
            <div className="flex-1 flex flex-col bg-white border-l" style={{ borderColor: 'var(--card-border)' }}>
              <GalleryHeader />
              <Tabs />
              <div className="layout-pane flex flex-1" style={{ background: '#fff' }}>
                <InnerSidebar features={features} roles={roles} perRole={perRole}
                  activeSection={activeSection} onSelectSection={setActiveSection}
                  contacts={contacts} />
                {activeSection === 'contacts' ? (
                  <ContactsView contacts={contacts} roles={roles}
                    onAdd={addContact} onRemoveContact={removeContact}
                    activeSection={activeSection} onSelectSection={setActiveSection} />
                ) : (
                <main className="main-pane flex-1 px-6 pt-6 pb-12" style={{ maxWidth: 920 }}>
                  <MobileSectionNav activeSection={activeSection}
                    onSelectSection={setActiveSection} contactsCount={contacts.length} />
                  <header className="gallery-features-header mb-4 flex items-start justify-between gap-4">
                    <div>
                      <h1 className="features-header-h1 text-[18px] font-extrabold tracking-tight uppercase" style={{ color: 'var(--brand)', letterSpacing: '0.02em' }}>Gallery Features</h1>
                      <p className="text-[13px] mt-1" style={{ color: 'var(--text-secondary)' }}>Control the social features options for this gallery.</p>
                    </div>
                    <button onClick={() => setShowModal(true)}
                      className="add-role-btn flex items-center gap-2 text-[11px] font-bold tracking-wider px-4 py-2 rounded-md text-white whitespace-nowrap shadow-sm">
                      <UserIcon size={13} stroke={2} /> ADD ROLE
                    </button>
                  </header>

                  {/* Mobile-only role strip — replaces the desktop column header so users can
                      still see roles, their counts, and access rename/duplicate/remove menus. */}
                  {isMobile && (
                    <div className="mobile-only mb-3 flex items-center gap-2 overflow-x-auto pb-1"
                      style={{ WebkitOverflowScrolling: 'touch' }}>
                      {roles.map(r => (
                        <button key={r.id} type="button"
                          onClick={(e) => { e.stopPropagation(); setOpenMenuRoleId(r.id); }}
                          className="relative flex items-center rounded-full border bg-white px-3 py-1.5 whitespace-nowrap shrink-0 text-[11px] font-bold uppercase tracking-wider"
                          style={{ borderColor: 'var(--card-border)', color: 'var(--text-secondary)' }}>
                          {r.name}
                          <span className="ml-1" style={{ color: 'var(--text-tertiary)', fontWeight: 600 }}>({contacts.filter(c => c.roleId === r.id).length})</span>
                        </button>
                      ))}
                    </div>
                  )}
                  {/* Mobile bottom-sheet for role actions — replaces the cramped dropdown. */}
                  {isMobile && openMenuRoleId && (() => {
                    const r = roles.find(x => x.id === openMenuRoleId);
                    if (!r) return null;
                    return (
                      <RoleActionsSheet
                        role={r}
                        onClose={() => setOpenMenuRoleId(null)}
                        onAddContact={() => { setOpenMenuRoleId(null); setContactRoleId(r.id); }}
                        onRename={() => {
                          setOpenMenuRoleId(null);
                          const next = window.prompt('Rename role', r.name);
                          if (next != null) renameRole(r.id, next);
                        }}
                        onSaveLater={() => { showToast(`"${r.name}" saved for later use`); setOpenMenuRoleId(null); }}
                        onDuplicate={() => { duplicateRole(r.id); setOpenMenuRoleId(null); }}
                        onRemove={() => { removeRole(r.id); setOpenMenuRoleId(null); }}
                      />
                    );
                  })()}

                  <div className="bg-white rounded-xl border" style={{ borderColor: 'var(--card-border)' }}>
                    {/* Header row — desktop only; mobile uses the role strip above + per-feature stacked rows. */}
                    {!isMobile && (
                      <div className="grid items-center" style={{ gridTemplateColumns: gridCols, padding: '14px 0',
                        background: 'var(--soft-bg)', borderTopLeftRadius: 12, borderTopRightRadius: 12 }}>
                        <div className="pl-6 text-[13px]" style={{ color: 'var(--text-secondary)' }}>Feature</div>
                        {roles.map(r => (
                          <ColumnHeader key={r.id} role={r}
                            contactCount={contacts.filter(c => c.roleId === r.id).length}
                            isMenuOpen={openMenuRoleId === r.id}
                            onMenuToggle={() => setOpenMenuRoleId(openMenuRoleId === r.id ? null : r.id)}
                            isRenaming={renamingRoleId === r.id}
                            onCommitRename={(name) => renameRole(r.id, name)}
                            onCancelRename={() => setRenamingRoleId(null)}
                            onRename={() => { setRenamingRoleId(r.id); setOpenMenuRoleId(null); }}
                            onDuplicate={() => { duplicateRole(r.id); setOpenMenuRoleId(null); }}
                            onRemove={() => { removeRole(r.id); setOpenMenuRoleId(null); }}
                            onSaveLater={() => { showToast(`"${r.name}" saved for later use`); setOpenMenuRoleId(null); }}
                            onAddContact={() => setContactRoleId(r.id)}
                          />
                        ))}
                      </div>
                    )}

                    {features.map(feature => {
                      const hasSettings = feature.settings.length > 0;
                      const isOpen = openFeatures.has(feature.id);

                      return (
                        <React.Fragment key={feature.id}>
                          <MatrixRow
                            feature={feature} roles={roles} perRole={perRole}
                            isOpen={isOpen} onToggleOpen={() => toggleOpen(feature.id)}
                            onToggleEnabled={(rId) => toggleEnabled(feature.id, rId)}
                            gridCols={gridCols} hasSettings={hasSettings} isMobile={isMobile}
                            onEditSettings={() => setMobileEditFeatureId(feature.id)}
                          />
                          {/* Inline settings panel only on desktop. On mobile, settings open
                              in MobileFeatureSettingsModal triggered by the EDIT SETTINGS button. */}
                          {!isMobile && isOpen && hasSettings && (
                            isMultiRole ? (
                              <MultiRoleSettingsBlock
                                feature={feature} roles={roles} perRole={perRole}
                                onUpdate={(rId, sId, v) => updateValue(feature.id, rId, sId, v)}
                                onUpdateShared={(sId, v) => updateSharedValue(feature.id, sId, v)}
                              />
                            ) : (
                              <SimpleSettingsBlock feature={feature} role={roles[0]} perRole={perRole}
                                onUpdate={(rId, sId, v) => updateValue(feature.id, rId, sId, v)} />
                            )
                          )}
                        </React.Fragment>
                      );
                    })}
                  </div>
                </main>
                )}
              </div>
            </div>
          </div>

          {showModal && (
            <AddRoleModal onClose={() => setShowModal(false)}
              onSelect={addRole} existingNames={existingNames} />
          )}

          {contactRoleId && (() => {
            const r = roles.find(x => x.id === contactRoleId);
            if (!r) return null;
            return (
              <AddContactToRoleModal
                role={r}
                onClose={() => setContactRoleId(null)}
                onAdd={(c) => addContact({ ...c, roleId: r.id })} />
            );
          })()}

          {mobileEditFeatureId && (() => {
            const feature = features.find(f => f.id === mobileEditFeatureId);
            if (!feature) return null;
            return (
              <MobileFeatureSettingsModal
                feature={feature} roles={roles} perRole={perRole}
                onClose={() => setMobileEditFeatureId(null)}
                onUpdate={(rId, sId, v) => updateValue(feature.id, rId, sId, v)}
                onUpdateShared={(sId, v) => updateSharedValue(feature.id, sId, v)} />
            );
          })()}

          {toast && (
            <div className="fixed bottom-6 right-6 z-50 text-white text-[13px] px-4 py-2.5 rounded-lg shadow-lg modal-card"
              style={{ background: 'rgba(27, 28, 31, 0.92)' }}>
              {toast}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
